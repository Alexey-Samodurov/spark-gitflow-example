sparkjob:
  image:
    repository: apache/spark
    tag: "3.5.8-scala2.12-java11-python3-ubuntu"

  job:
    mainClass: org.apache.spark.examples.SparkPi
    mainApplicationFile: "local:///opt/spark/examples/jars/spark-examples_2.12-3.5.8.jar"

  runtimeVersions:
    sparkVersion: "3.5.8"

  driver:
    cores: 1
    memory: "512m"

  executor:
    instances: 1
    cores: 1
    memory: "512m"

  sparkConf:
    spark.ui.enabled: "false"

  applicationTolerations:
    resourceRetainPolicy: Never
    restartConfig:
      restartPolicy: Never

  serviceAccount:
    create: true
