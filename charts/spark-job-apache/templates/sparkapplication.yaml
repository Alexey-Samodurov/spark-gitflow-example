apiVersion: spark.apache.org/v1
kind: SparkApplication
metadata:
  name: {{ include "spark-job-apache.fullname" . }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "spark-job-apache.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # ── Main class & jars ────────────────────────────────────────────
  {{- if .Values.job.mainClass }}
  mainClass: {{ .Values.job.mainClass | quote }}
  {{- end }}
  jars: {{ .Values.job.mainApplicationFile | quote }}
  {{- if .Values.job.pyFiles }}
  pyFiles: {{ .Values.job.pyFiles | quote }}
  {{- end }}

  # ── Runtime versions ─────────────────────────────────────────────
  runtimeVersions:
    sparkVersion: {{ .Values.runtimeVersions.sparkVersion | quote }}

  # ── Application tolerations ──────────────────────────────────────
  applicationTolerations:
    resourceRetainPolicy: {{ .Values.applicationTolerations.resourceRetainPolicy }}
    {{- with .Values.applicationTolerations.restartConfig }}
    restartConfig:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.applicationTolerations.instanceConfig }}
    instanceConfig:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.applicationTolerations.applicationTimeoutConfig }}
    applicationTimeoutConfig:
      {{- toYaml . | nindent 6 }}
    {{- end }}

  # ── Spark configuration ──────────────────────────────────────────
  # Image, service account, driver/executor resources are set here
  # along with any user-provided sparkConf overrides
  sparkConf:
    spark.kubernetes.container.image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag | quote }}
    spark.kubernetes.authenticate.driver.serviceAccountName: {{ include "spark-job-apache.serviceAccountName" . }}
    spark.driver.cores: {{ .Values.driver.cores | quote }}
    spark.driver.memory: {{ .Values.driver.memory | quote }}
    spark.executor.instances: {{ .Values.executor.instances | quote }}
    spark.executor.cores: {{ .Values.executor.cores | quote }}
    spark.executor.memory: {{ .Values.executor.memory | quote }}
    {{- with .Values.sparkConf }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
