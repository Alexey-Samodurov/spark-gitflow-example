# ─────────────────────────────────────────────
# Global / metadata
# ─────────────────────────────────────────────
nameOverride: ""
fullnameOverride: ""

## Namespace is controlled by ArgoCD destination; set here only for local helm install
namespace: ""

# ─────────────────────────────────────────────
# Container image
# Passed to CRD via sparkConf:
#   spark.kubernetes.container.image
# ─────────────────────────────────────────────
image:
  repository: ""          # e.g. apache/spark
  tag: "latest"

# ─────────────────────────────────────────────
# Spark job definition
# ─────────────────────────────────────────────
job:
  mainClass: ""            # e.g. org.apache.spark.examples.SparkPi
  mainApplicationFile: ""  # e.g. local:///opt/spark/examples/jars/spark-examples.jar
  arguments: []            # Arguments passed to main class, e.g. ["file:///opt/spark/RELEASE"]
  pyFiles: ""              # optional: comma-separated Python files / zips

# ─────────────────────────────────────────────
# Runtime versions (required by Apache operator)
# ─────────────────────────────────────────────
runtimeVersions:
  sparkVersion: "3.5.0"

# ─────────────────────────────────────────────
# Driver pod configuration
# Mapped to sparkConf spark.driver.* properties
# ─────────────────────────────────────────────
driver:
  cores: 1
  memory: "1g"

# ─────────────────────────────────────────────
# Executor pod configuration
# Mapped to sparkConf spark.executor.* properties
# ─────────────────────────────────────────────
executor:
  instances: 1
  cores: 1
  memory: "1g"

# ─────────────────────────────────────────────
# Application tolerations
# Controls restart, resource retain, scaling
# ─────────────────────────────────────────────
applicationTolerations:
  # What to do with K8s resources after app terminates
  # Never — delete all pods/services after completion
  # OnFailure — retain on failure for debugging
  # Always — always retain
  resourceRetainPolicy: Never

  # Restart configuration
  restartConfig: {}
    # restartPolicy: OnFailure          # Never | OnFailure | Always | OnInfrastructureFailure
    # maxRestartAttempts: 3
    # restartBackoffMillis: 10000

  # Dynamic allocation / instance config
  instanceConfig: {}
    # initExecutors: 1
    # minExecutors: 1
    # maxExecutors: 3

  # Timeout configuration
  applicationTimeoutConfig: {}
    # driverStartTimeoutMillis: 300000
    # driverReadyTimeoutMillis: 300000
    # executorStartTimeoutMillis: 300000

# ─────────────────────────────────────────────
# Additional Spark configuration (spark.* properties)
# These are merged with auto-generated driver/executor
# and image configs below
# ─────────────────────────────────────────────
sparkConf: {}
  # spark.sql.shuffle.partitions: "200"
  # spark.eventLog.enabled: "true"
  # spark.eventLog.dir: "s3a://my-bucket/spark-logs"
  # spark.dynamicAllocation.enabled: "true"

# ─────────────────────────────────────────────
# Service account (created by this chart)
# ─────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""                 # defaults to fullname
  annotations: {}
  automountToken: true

# RBAC – grant driver SA the edit role in its namespace
rbac:
  create: true

# ─────────────────────────────────────────────
# Extra labels / annotations on SparkApplication
# ─────────────────────────────────────────────
commonLabels: {}
commonAnnotations: {}
