{{- if .Values.rbac.create -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "spark-job.fullname" . }}-driver
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "spark-job.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, create, delete, deletecollection, patch]
  - apiGroups: [""]
    resources: [services]
    verbs: [get, create, delete]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, create, delete, deletecollection]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, create, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "spark-job.fullname" . }}-driver
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "spark-job.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "spark-job.fullname" . }}-driver
subjects:
  - kind: ServiceAccount
    name: {{ include "spark-job.serviceAccountName" . }}
    namespace: {{ .Values.namespace | default .Release.Namespace }}
{{- end }}
